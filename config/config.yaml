# Meridian configuration. All thresholds that matter live in Layer-1
# featurization (later phases), NOT here. This file is wiring + run policy.

project:
  name: meridian
  timezone: America/New_York

storage:
  duckdb_path: data/meridian.duckdb

universe:
  file: config/universe.csv
  index_etfs: config/index_etfs.csv

# Data adapters: free first, Robinhood MCP second, paid only where flagged.
# Adapters SHIP DISABLED. Enable per-adapter here, or override per-run with the
# CLI flag: `meridian ingest --date D -a yfinance -a fred -a edgar -a news_rss -a earnings`.
adapters:
  yfinance:                       # price/volume for stocks + ETFs + index/macro
    enabled: false
    priority: 1
    intraday_interval: "5m"       # intraday bar interval for the intraday loop (Step A2)
  fred:                           # macro: yields, rates, VIX, dollar (keyless CSV)
    enabled: false
    priority: 1
    api_key_env: FRED_API_KEY     # optional; falls back to keyless fredgraph.csv
    # series: {DGS10: 10Y yield, DGS2: 2Y yield, DFF: fed funds}   # override defaults
  edgar:                          # SEC filings (8-K, S-3, 13D/G, Form 4, 10-Q/K)
    enabled: false
    priority: 1
    user_agent: "meridian research contact@example.com"   # SEC requires a real UA
  news_rss:                       # Yahoo Finance per-symbol RSS (free, real pubDate)
    enabled: false
    priority: 1
    scope: movers                 # movers (intraday: watchlist) | universe (EOD: all, throttled)
    max_req_per_sec: 5            # throttle for universe scope
    # watchlist: [AAPL, MSFT, NVDA, JPM]   # movers-scope symbols (optional)
  earnings:                       # earnings dates/results (free via yfinance)
    enabled: false
    priority: 1
    max_symbols: 60               # per-ticker scan cap; bulk path is Robinhood MCP
    workers: 8
  finra:                          # equity flow: short-volume + dark-pool (FREE, no key/limit)
    enabled: true                 # safe baseline — keyless, never rate-limited
    priority: 1
    ats_max_symbols: 40           # per-symbol ATS (dark-pool) scan cap
    # ats_watchlist: [AAPL, MSFT, NVDA]   # restrict ATS scan (optional)
  # Options source (Phase 5/Issue 3). Real-first. `fixture` is for tests / explicit dev
  # only — fixture-sourced gamma reads are PROXY-banner-flagged and tier-capped.
  options_source: yfinance        # yfinance (default, real) | robinhood | fixture
  options:                        # dealer-positioning snapshots
    enabled: false
    priority: 2
    fixtures_dir: config/fixtures/options   # <dir>/<YYYY-MM-DD>/<TICKER>.json (tests/dev)
    risk_free_rate: 0.0
    # tickers: [AAPL, MSFT, NVDA, JPM]      # liquid names to scan on a live run (optional)
  robinhood:   {enabled: false, priority: 2}   # MCP-backed; quotes/options/fundamentals
  thetadata:   {enabled: false, priority: 3}   # PAID, optional (Phase 6 gamma fidelity only)

run_modes:
  eod_batch:
    enabled: true
    premarket_scan_et: "08:30"
    postclose_postmortem_et: "16:30"
  intraday:
    enabled: false          # switched on in Phase 7
    poll_seconds: 300

explanation:
  mode: deterministic       # ONLY mode. No LLM anywhere in the build.

# Predictive engine (Phase 6). Forward odds are conditional, regime-aware, and always
# reported with the unexplained residual — never a guarantee.
predict:
  horizons_days: [1, 3, 5]      # forward-return horizons (EOD daily granularity)
  return_threshold: 0.0         # P(directional forward return > threshold)
  backtest_exit_horizon_days: 3
  calibration_bins: 5
  min_outcomes_for_calibration: 8
  walkforward_min_train: 20     # min firings before walk-forward validation kicks in

engine:
  regime_baseline_window_days: 60   # used by L1 featurization in later phases
  causal_test_alpha: 0.05           # edge trusted only if p < alpha (Phase 6)

  # L2 structural matching (Phase 3). Operator windows + a reporting completeness
  # floor. These are NOT featurization thresholds (those live only under
  # `featurization`): completeness is already a graded [0,1] engine output.
  match:
    min_completeness: 0.50          # report a firing at/above this completeness
    concurrent_window_seconds: 86400  # daily granularity = same session
    precedes_min_lag_seconds: 0
    precedes_max_window_seconds: 86400

  # L3 scoring + honesty layer (Phase 4). Transparent weighted model to start.
  # attribution weights + unexplained_residual ALWAYS sum to 1.0 (enforced + tested);
  # explained fraction is capped so the residual is never rounded to zero.
  scoring:
    weights:                        # confidence = weighted blend (renormalized)
      completeness: 0.40
      abnormality: 0.25
      corroboration: 0.15
      lead_lag: 0.10
      hit_rate: 0.10
    neutral_hit_rate: 0.50          # until the predictive engine exists (Phase 6)
    min_residual: 0.05              # explanation is never rounded to 100%
    tier_high: 0.70
    tier_medium: 0.45
    tier_low: 0.20
    options_proxy_cap_tier: Medium  # constraint: price-only proxy can't be High

  # Layer-1 featurization (Phase 2). THE ONLY place thresholds may live.
  # Abnormality is graded vs each name's OWN trailing regime baseline (percentile),
  # never a global hard cutoff. No pattern definition may hard-code any of these.
  featurization:
    baseline_window_days: 60        # trailing window for own-name abnormality grading
    beta_window_days: 60            # trailing window for beta/expected-behavior model
    min_history_days: 20            # below this, grade as insufficient_history
    history_calendar_days: 200      # calendar lookback fetched to cover the windows
    rel_volume_window_days: 20      # trailing mean volume window
    atr_window_days: 14             # ATR window
    trend_sma_days: 50              # index-trend SMA
    vix_high_pctile: 0.70           # VIX >= this trailing pctile -> high_vol regime
    vix_low_pctile: 0.30            # VIX <= this trailing pctile -> low_vol regime
    breadth_broad: 0.60             # advancers fraction >= this -> broad_advance
    breadth_weak: 0.40              # advancers fraction <= this -> broad_decline
    insufficient_history_abnormality: 0.5  # neutral grade when history is too short
    discrete_priors:                # abnormality prior for catalysts lacking own history
      filing: 0.70
      news: 0.60
      earnings: 0.90
      default: 0.60
    options:                        # dealer-positioning grading (Phase 5), L1 thresholds
      spot_into_strike_pct: 0.03    # spot within 3% of a wall = "into strike"
      neutral_iv_rank: 0.50         # used when IV history is unavailable
